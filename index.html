<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzas PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --verde: #34C759;
            --rojo: #FF3B30;
            --texto: #1C1C1E;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--ios-bg); 
            margin: 0; padding: 20px; 
            color: var(--texto);
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* CABECERA */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header h1 { font-size: 28px; margin: 0; }
        .balance-card { text-align: right; background: var(--ios-blue); color: white; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 12px rgba(0,122,255,0.3); }
        .balance-card small { opacity: 0.8; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .balance-card h2 { margin: 0; font-size: 28px; }

        /* FORMULARIO ADAPTABLE */
        .card-form { 
            background: white; border-radius: 15px; padding: 20px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 25px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; align-items: flex-end;
        }

        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: 700; color: #8E8E93; text-transform: uppercase; margin-left: 5px; }
        input, select { 
            height: 44px; border: 1px solid #E5E5EA; border-radius: 10px; 
            padding: 0 12px; font-size: 16px; background: #F9F9F9; outline: none; box-sizing: border-box;
        }
        
        .btn-add { 
            height: 44px; background: var(--ios-blue); color: white; border: none; 
            border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-export {
            height: 44px; background: white; color: var(--ios-blue); border: 1px solid var(--ios-blue);
            border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-add:active, .btn-export:active { opacity: 0.7; }

        /* FILTRO BUSQUEDA */
        .search-container { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .search-input { 
            flex-grow: 1; height: 40px; border-radius: 10px; border: 1px solid #E5E5EA; 
            padding: 0 15px; font-size: 14px; outline: none; box-sizing: border-box;
        }
        .filtro-sum { background: #E5E5EA; padding: 10px 15px; border-radius: 10px; font-size: 14px; font-weight: 700; color: var(--texto); white-space: nowrap; }

        /* TABLA */
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #F9F9F9; padding: 15px; text-align: left; font-size: 12px; color: #8E8E93; border-bottom: 1px solid #E5E5EA; }
        td { padding: 15px; border-bottom: 1px solid #F2F2F7; font-size: 15px; }
        
        .monto { font-weight: 700; text-align: right; }
        .ingreso { color: var(--verde); }
        .gasto { color: var(--rojo); }

        /* PANEL DE AHORROS */
        .panel-ahorros {
            background: white; padding: 20px; border-radius: 15px; margin-top: 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid var(--ios-blue); box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* --- AJUSTES ESPECÍFICOS PARA MÓVIL (iPhone 13) --- */
        @media (max-width: 768px) {
            body { padding: 10px; padding-bottom: 110px; }
            .header h1 { font-size: 22px; }
            .balance-card h2 { font-size: 22px; }
            .search-container { flex-direction: column; align-items: stretch; }
            .card-form { grid-template-columns: 1fr 1fr; }
            .full-mobile { grid-column: span 2; }
            .hide-mobile { display: none; }
            
            .panel-ahorros {
                position: fixed; bottom: 0; left: 0; right: 0; margin: 0;
                border-radius: 0; border-top: 1px solid #E5E5EA; border-left: none;
                padding: 15px; z-index: 100;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1></h1>
        <div class="balance-card">
            <small>Balance Global</small>
            <h2 id="balance-total">$0,00</h2>
        </div>
    </div>

    <div class="card-form">
        <div class="field full-mobile">
            <label>Mes de Registro</label>
            <select id="selector-mes" onchange="renderizarTabla()"></select>
        </div>
        <div class="field full-mobile">
            <label>Descripción</label>
            <input type="text" id="desc">
        </div>
        <div class="field">
            <label>Monto</label>
            <input type="number" id="monto">
        </div>
        <div class="field">
            <label>Divisa</label>
            <select id="divisa">
                <option value="UYU">UYU</option><option value="USD">USD</option><option value="EUR">EUR</option>
            </select>
        </div>
        <div class="field">
            <label>Categoría</label>
            <select id="categoria">
                <option value="Ingreso">Ingreso</option>
                <option value="Comida">Comida</option>
                <option value="Transporte">Transporte</option>
                <option value="Mascotas">Mascotas</option>
                <option value="Ahorros">Ahorros</option>
                <option value="Bobadas">Bobadas</option>
            </select>
        </div>
        <div class="field">
            <label>Tipo</label>
            <select id="tipo">
                <option value="ingreso">Ingreso (+)</option>
                <option value="gasto">Gasto (-)</option>
            </select>
        </div>
        <button class="btn-add full-mobile" onclick="agregarFila()">Añadir</button>
        <button class="btn-export full-mobile" onclick="exportarExcel()">Exportar</button>
    </div>

    <div class="search-container">
        <input type="text" id="buscador" class="search-input" placeholder="🔍 Filtrar categoría..." oninput="renderizarTabla()">
        <div id="sum-visible" class="filtro-sum">$0,00</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="hide-mobile">Fecha</th>
                    <th>Detalle</th>
                    <th>Original</th>
                    <th style="text-align:right">Impacto UYU</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
    </div>

    <div class="panel-ahorros">
        <div>
            <label>Ahorros</label>
            <div id="detalle-ahorros" style="font-weight: 600; font-size: 13px;">...</div>
        </div>
        <div style="text-align: right;">
            <label>Total Ahorrado</label>
            <div id="ahorro-total-uyu" style="font-weight: 800; color: var(--ios-blue); font-size: 18px;">...</div>
        </div>
    </div>
    
    <div id="api-info" style="text-align: center; font-size: 10px; color: #8E8E93; margin-top: 20px;">Cargando tasas...</div>
</div>

<script>
    // --- CREDENCIALES ---
    const firebaseConfig = {
        apiKey: "AIzaSyApbvWi5bPZBMj8zX-FM-ZM1GEVRvJoXTU",
        authDomain: "mis-finanzas-27079.firebaseapp.com",
        databaseURL: "https://mis-finanzas-27079-default-rtdb.firebaseio.com",
        projectId: "mis-finanzas-27079",
        storageBucket: "mis-finanzas-27079.firebasestorage.app",
        messagingSenderId: "89175660072",
        appId: "1:89175660072:web:db874cdadbedb92f9f471d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let baseDeDatos = {};
    let tasas = { USD: 1, EUR: 1, UYU: 1 };

    db.ref('finanzas').on('value', (snapshot) => {
        baseDeDatos = snapshot.val() || {};
        actualizarSelectorMeses();
        renderizarTabla();
    });

    async function actualizarTasas() {
        try {
            const resp = await fetch(`https://open.er-api.com/v6/latest/UYU`);
            const data = await resp.json();
            tasas = data.rates;
            document.getElementById('api-info').textContent = `Tasas: 1 USD = $${(1/tasas.USD).toFixed(2)} | 1 EUR = $${(1/tasas.EUR).toFixed(2)}`;
        } catch (e) { }
    }

    function actualizarSelectorMeses() {
        const selector = document.getElementById('selector-mes');
        const mesAct = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}`;
        let meses = Object.keys(baseDeDatos);
        if (!meses.includes(mesAct)) meses.push(mesAct);
        meses.sort().reverse();
        const sel = selector.value || mesAct;
        selector.innerHTML = '';
        meses.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.textContent = m;
            if (m === sel) opt.selected = true;
            selector.appendChild(opt);
        });
    }

    function agregarFila() {
        const desc = document.getElementById('desc').value;
        const montoOrig = parseFloat(document.getElementById('monto').value);
        const divisa = document.getElementById('divisa').value;
        const cat = document.getElementById('categoria').value;
        let tipo = document.getElementById('tipo').value;
        const mes = document.getElementById('selector-mes').value;

        if (!desc || isNaN(montoOrig)) return;
        if (cat === "Ahorros") tipo = "gasto";

        db.ref(`finanzas/${mes}`).push({
            fecha: new Date().toLocaleDateString('es-UY'),
            desc, categoria: cat, montoOrig, divisa,
            montoEnUyu: montoOrig / tasas[divisa],
            tipo,
            timestamp: Date.now()
        });

        document.getElementById('desc').value = '';
        document.getElementById('monto').value = '';
    }

    function borrarFila(id) {
        if(confirm("¿Eliminar?")) {
            const mes = document.getElementById('selector-mes').value;
            db.ref(`finanzas/${mes}/${id}`).remove();
        }
    }

    function exportarExcel() {
        let csv = "Fecha;Mes;Descripcion;Categoria;Monto_Original;Divisa;Monto_UYU;Tipo\n";
        Object.keys(baseDeDatos).forEach(mKey => {
            Object.values(baseDeDatos[mKey]).forEach(mov => {
                csv += `${mov.fecha};${mKey};${mov.desc};${mov.categoria};${mov.montoOrig};${mov.divisa};${mov.montoEnUyu.toFixed(2)};${mov.tipo}\n`;
            });
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "mis_finanzas_global.csv";
        link.click();
    }

    function renderizarTabla() {
        const mesSel = document.getElementById('selector-mes').value;
        const filtro = document.getElementById('buscador').value.toLowerCase();
        const tabla = document.getElementById('cuerpo-tabla');
        tabla.innerHTML = '';
        
        let globalBal = 0, ahorroUyu = 0, ahorroDet = {USD:0, EUR:0, UYU:0};
        let totalVisible = 0; // NUEVA VARIABLE PARA LA SUMA DEL FILTRO

        Object.keys(baseDeDatos).forEach(mKey => {
            Object.values(baseDeDatos[mKey]).forEach(mov => {
                const imp = mov.tipo === 'ingreso' ? mov.montoEnUyu : -mov.montoEnUyu;
                globalBal += imp;
                if(mov.categoria === "Ahorros") {
                    ahorroUyu += mov.montoEnUyu;
                    ahorroDet[mov.divisa] += mov.montoOrig;
                }
            });
        });

        const movs = baseDeDatos[mesSel] || {};
        Object.keys(movs).forEach(id => {
            const mov = movs[id];
            if (mov.categoria.toLowerCase().includes(filtro)) {
                const impacto = mov.tipo === 'ingreso' ? mov.montoEnUyu : -mov.montoEnUyu;
                totalVisible += impacto; // SUMAMOS SOLO LO QUE SE VE

                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td class="hide-mobile" style="color:#8E8E93; font-size:12px">${mov.fecha}</td>
                    <td>
                        <div style="font-weight:600">${mov.desc}</div>
                        <span style="font-size:10px; background:#F2F2F7; padding:2px 6px; border-radius:4px; font-weight:700; color:#8E8E93">${mov.categoria}</span>
                    </td>
                    <td style="font-size:13px">${mov.montoOrig.toLocaleString()} ${mov.divisa}</td>
                    <td class="monto ${mov.tipo}">$${mov.montoEnUyu.toLocaleString('es-UY',{minimumFractionDigits:2})}</td>
                    <td><button onclick="borrarFila('${id}')" style="border:none; background:none; color:#C7C7CC; cursor:pointer; font-size:18px">×</button></td>
                `;
                tabla.appendChild(fila);
            }
        });

        document.getElementById('balance-total').textContent = `$${globalBal.toLocaleString('es-UY',{minimumFractionDigits:2})}`;
        document.getElementById('sum-visible').textContent = `Visible: $${totalVisible.toLocaleString('es-UY',{minimumFractionDigits:2})}`;
        document.getElementById('detalle-ahorros').innerHTML = `USD ${ahorroDet.USD.toLocaleString()} · EUR ${ahorroDet.EUR.toLocaleString()} · UYU ${ahorroDet.UYU.toLocaleString()}`;
        document.getElementById('ahorro-total-uyu').textContent = `$${ahorroUyu.toLocaleString('es-UY',{minimumFractionDigits:2})}`;
    }

    window.onload = actualizarTasas;
</script>
</body>
</html>
